<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Site historia</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* TOPO */
header {
    background: #c4170c;
    color: white;
    padding: 15px;
    text-align: center;
    position: relative;
}

.menu-btn {
    position: absolute;
    left: 15px;
    font-size: 24px;
    cursor: pointer;
}

/* MENU */
.menu {
    position: fixed;
    left: -250px;
    top: 0;
    width: 250px;
    height: 100%;
    background: #c4170c;
    padding-top: 60px;
    transition: 0.3s;
}

.menu a {
    display: block;
    color: white;
    padding: 15px;
    text-decoration: none;
    font-size: 18px;
}

.menu a:hover {
    background: #a31209;
}

.container {
    max-width: 800px;   /* limita a largura */
    margin: 40px auto;  /* centraliza */
    background: white;
    padding: 30px;
    border-radius: 10px;
}

.imagem {
    width: 100%;
    border-radius: 10px;
}

.video {
    width: 100%;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>
    <span class="menu-btn" onclick="toggleMenu()">☰</span>
    QUILOMBO DOS PALMARES
</header>

<div id="menu" class="menu">
    <a href="index.html">Introdução</a>
    <a href="historia1.html">História parte 1</a>
    <a href="historia2.html">História parte 2</a>
    <a href="cultura.html">Cultura</a>
    <a href="territorio.html">Território</a>
    <a href="Video.html">Nosso video</a>
</div>

<div class="container">
     <h1>Vida Palmarina Podcast</h1>
  <div class="container">
    <p>Veja o vídeo abaixo:</p>
     <strong>Vida Palmarina: <a href="https://youtu.be/OAPt60fgK9g?si=wRPt2msYsDq5Jo-0">Introdução vida palmarina</a></strong>

</div>
</div>

<script>
function toggleMenu() {
    let menu = document.getElementById("menu");

    if (menu.style.left === "0px") {
        menu.style.left = "-250px";
    } else {
        menu.style.left = "0px";
    }
}
</script>

</body>
</html>
